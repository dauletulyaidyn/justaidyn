<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Courses | Coming Soon</title>
  <meta name="description" content="Courses by JustAidyn is coming soon.">
  <style>
    :root {
      color-scheme: light;
      --bg: #f5efe8;
      --text: #1c2530;
      --muted: #5a6570;
      --accent: #8a5a18;
      --panel: rgba(255, 255, 255, 0.88);
      --border: rgba(28, 37, 48, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, sans-serif;
      background:
        linear-gradient(rgba(245, 239, 232, 0.9), rgba(245, 239, 232, 0.94)),
        url("../images/couple-working-from-home-together-sofa.jpg") center / cover no-repeat;
      color: var(--text);
    }

    main {
      width: min(720px, 100%);
      padding: 40px 32px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      backdrop-filter: blur(4px);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3.5rem);
      line-height: 1.05;
    }

    p {
      margin: 0;
      font-size: 1.05rem;
      line-height: 1.6;
      color: var(--muted);
    }

    a {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main>
    <h1>Courses</h1>
    <p>Coming soon. This JustAidyn learning portal is being prepared now. Follow updates from <a href="https://justaidyn.com/">justaidyn.com</a>.</p>
  </main>
</body>
</html>
