<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillsMinds | Coming Soon</title>
  <meta name="description" content="SkillsMinds by JustAidyn is coming soon.">
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f1ea;
      --text: #17212b;
      --muted: #57606a;
      --accent: #116466;
      --panel: rgba(255, 255, 255, 0.88);
      --border: rgba(23, 33, 43, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, sans-serif;
      background:
        linear-gradient(rgba(244, 241, 234, 0.9), rgba(244, 241, 234, 0.94)),
        url("../images/white-desk-work-study-aesthetics.jpg") center / cover no-repeat;
      color: var(--text);
    }

    main {
      width: min(720px, 100%);
      padding: 40px 32px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      backdrop-filter: blur(4px);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3.5rem);
      line-height: 1.05;
    }

    p {
      margin: 0;
      font-size: 1.05rem;
      line-height: 1.6;
      color: var(--muted);
    }

    a {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main>
    <h1>SkillsMinds</h1>
    <p>Coming soon. This JustAidyn project space is being prepared now. Follow updates from <a href="https://justaidyn.com/">justaidyn.com</a>.</p>
  </main>
</body>
</html>
