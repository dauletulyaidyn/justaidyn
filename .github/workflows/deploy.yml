name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 89.207.254.135 >> ~/.ssh/known_hosts

      - name: Sync files to server
        run: |
          rsync -avz --delete \
            --exclude=node_modules \
            --exclude=.git \
            --exclude='*.msi' \
            --exclude='*.exe' \
            --exclude='.env' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ root@89.207.254.135:/var/www/justaidyn.com/

      - name: Build and restart app
        run: |
          ssh -i ~/.ssh/deploy_key root@89.207.254.135 "
            cd /var/www/justaidyn.com &&
            npm install --omit=dev &&
            npx prisma generate &&
            npm run build &&
            pm2 reload all || pm2 restart all || true
          "
