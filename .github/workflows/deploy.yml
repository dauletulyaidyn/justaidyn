name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 89.207.254.135
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /var/www/justaidyn.com
            git fetch --prune origin
            git reset --hard origin/main
            git clean -fd
            npm install
            npm run build
            pm2 reload all 2>/dev/null || pm2 restart all 2>/dev/null || (pkill -f "node dist/main" || true; sleep 1; nohup node dist/main.js >> /var/log/justaidyn.log 2>&1 &)
            echo "Deployment complete!"
