name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 89.207.254.135
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "."
          target: "/var/www/justaidyn.com"
          rm: false

      - name: Restart app
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: 89.207.254.135
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            pm2 reload all || pm2 restart all || true
